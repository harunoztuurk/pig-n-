<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- OYUN BAŞLIĞI BURAYA -->
    <title>Koordinat Kurtarma - Pi Günü</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="style.css">

    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>

<body>
    <div class="scanline"></div>
    <div class="wrapper">
        <nav class="back-nav">
            <a href="../../index.html" class="btn back-btn">◂ ANA MENÜYE DÖN</a>
        </nav>

        <header class="header">
            <h1 class="title">KOORDİNAT KURTARMA</h1>
            <div class="subtitle">// X VE Y DÜZLEMİNDE GEZİN //</div>
        </header>

        <div class="divider"></div>

        <!-- ANA OYUN İSKELETİZİ BURAYA KURUN -->
        <main class="game-container">
            <div class="section-label">[ OYUN ALANI ]</div>

            <div class="game-content koordinat-board">
                <div class="radar-panel">
                    <div class="radar-task">
                        <span style="color:var(--cyan);">HEDEF KOORDİNAT:</span> 
                        <strong id="targetCoordinate" style="font-size: 1.5rem; color:var(--pink);">[ X: ? , Y: ? ]</strong>
                    </div>
                </div>

                <div class="grid-container" id="gridContainer">
                    <!-- Javascript ile grid oluşturulacak (ör. -5'ten +5'e) -->
                    <div class="axis x-axis"></div>
                    <div class="axis y-axis"></div>
                </div>
                
                <div class="btn-row" style="margin-top:20px;">
                    <span id="selectedDisplay" style="color:var(--yellow); font-family: monospace; font-size: 1.2rem; margin-right: 20px;">Seçtiğin: [ -- , -- ]</span>
                </div>

                <div id="gameMessage" class="game-message" style="margin-top: 15px;"></div>
            </div>

            <div class="btn-row" style="margin-top:20px;">
                <button class="btn check-btn" onclick="checkGame()">▸ KONTROL ET</button>
            </div>
        </main>

        <div class="divider"></div>
        <footer class="footer">
            <div class="copyright-wrap" style="flex-direction: column; align-items: center; gap: 8px;">
                <div class="copyright"><span class="tm">TM</span> <a href="#" target="_blank" class="author-link">Müfit
                        ŞAN</a> tarafından tasarlanmıştır.</div>
                <div class="copyright"><a href="https://www.zolak.com.tr/" target="_blank" class="author-link">Harun
                        Öztürk</a> tarafından geliştirilmiştir.</div>
            </div>
        </footer>
    </div>

    <!-- UTILS VE APP.JS -->
    <script src="../../js/utils.js"></script>
    <script src="app.js"></script>
</body>

</html>
